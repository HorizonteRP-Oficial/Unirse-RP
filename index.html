<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando Sesión...</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #f1c40f;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="spinner" class="spinner"></div>
        <h1>HORIZONTE ROLEPLAY</h1>
        <p id="status">Iniciando Roblox, por favor espera...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const placeId = urlParams.get('placeId');
        const linkCode = urlParams.get('linkCode');
        const expires = urlParams.get('expires');

        // Borramos los parámetros de la barra de direcciones al instante para que no los copien
        window.history.replaceState({}, document.title, window.location.pathname);

        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').innerText = message;
            document.getElementById('status').style.color = '#ff4d4d';
        }

        if (expires) {
            // Validar si el enlace ya expiró (compara el tiempo actual con el límite de 15 segundos)
            const now = Math.floor(Date.now() / 1000);
            if (now > parseInt(expires)) {
                showError("Error: El enlace de un solo uso ha expirado (límite de 15 segundos). Solicita otro.");
            } else {
                // Redirigir a Roblox si está dentro del tiempo límite
                let robloxUri = "";
                if (code) {
                    robloxUri = `roblox://navigation/share_links?code=${code}&type=Server`;
                } else if (placeId && linkCode) {
                    robloxUri = `roblox://experiences/start?placeId=${placeId}&linkCode=${linkCode}`;
                }

                if (robloxUri) {
                    window.location.href = robloxUri;
                    setTimeout(() => {
                        window.location.href = robloxUri;
                    }, 2000);
                } else {
                    showError("Error: Datos de sesión inválidos.");
                }
            }
        } else {
            showError("Error: Acceso no autorizado o parámetro de tiempo faltante.");
        }
    </script>
</body>
</html>
